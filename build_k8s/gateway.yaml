apiVersion: apps/v1
kind: Deployment
metadata:
  name: submission-gateway
  namespace: default
  labels:
    app: submission-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: submission-gateway
  template:
    metadata:
      labels:
        app: submission-gateway
    spec:
      serviceAccountName: iicpc-gateway
      containers:
      - name: gateway
        image: 445711599575.dkr.ecr.us-east-1.amazonaws.com/iicpc-gateway:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: iicpc-config
        env:
        - name: LEADERBOARD_JSON_PATH
          value: "/app/data/leaderboard.json"
        volumeMounts:
        - name: public-html
          mountPath: /app/data
        resources:
          limits:
            cpu: "1"
            memory: 512Mi
          requests:
            cpu: "250m"
            memory: 256Mi
        readinessProbe:
          httpGet:
            path: /api/v1/builds
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /api/v1/builds
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: public-html
        persistentVolumeClaim:
          claimName: public-html-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: submission-gateway
  namespace: default
spec:
  ports:
  - port: 3000
    targetPort: 3000
  selector:
    app: submission-gateway
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: submission-gateway-ingress
  namespace: default
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
spec:
  ingressClassName: alb
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: submission-gateway
            port:
              number: 3000

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gateway-pod-reader
  namespace: default
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gateway-pod-reader-binding
  namespace: default
subjects:
- kind: ServiceAccount
  name: iicpc-gateway
  namespace: default
roleRef:
  kind: Role
  name: gateway-pod-reader
  apiGroup: rbac.authorization.k8s.io
