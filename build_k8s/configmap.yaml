apiVersion: v1
kind: ConfigMap
metadata:
  name: iicpc-config
  namespace: default
data:
  REDIS_ADDR: "redis:6379"
  DB_ADDR: "postgres://iicpc:iicpc_secret@postgres:5432/iicpc_db?sslmode=disable"
  S3_ENDPOINT: "host.docker.internal:9000"
  S3_BUCKET: "submissions"
  S3_USE_SSL: "false"
  S3_ACCESS_KEY: "minioadmin"
  S3_SECRET_KEY: "minioadmin"
  REGISTRY_URL: ""
  SANDBOX_NAMESPACE: "iicpc-sandboxes"
  POD_NAMESPACE: "default"
  KAFKA_BROKERS: "host.docker.internal:9092"
