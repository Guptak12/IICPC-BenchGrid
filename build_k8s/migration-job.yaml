apiVersion: batch/v1
kind: Job
metadata:
  name: iicpc-migration-job
  namespace: default
spec:
  template:
    spec:
      containers:
      - name: migration
        image: 445711599575.dkr.ecr.us-east-1.amazonaws.com/iicpc-init-db:latest
        imagePullPolicy: Always
        # Use sh -c so the shell expands $DB_ADDR at runtime.
        # Kubernetes's $(VAR) substitution in command[] only works for env: entries,
        # not envFrom:, so we rely on the shell instead.
        command:
        - sh
        - -c
        - |
          echo "Connecting to: $DB_ADDR"
          /usr/local/bin/goose -dir /migrations postgres "$DB_ADDR" up
        env:
        - name: DB_ADDR
          valueFrom:
            configMapKeyRef:
              name: iicpc-config
              key: DB_ADDR
        envFrom:
        - configMapRef:
            name: iicpc-config
        volumeMounts:
        - name: migration-volume
          mountPath: /migrations
      volumes:
      - name: migration-volume
        configMap:
          name: migrations-config
      restartPolicy: OnFailure
  backoffLimit: 5
