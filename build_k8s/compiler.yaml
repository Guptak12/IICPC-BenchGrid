apiVersion: apps/v1
kind: Deployment
metadata:
  name: compilation-worker
  namespace: default
  labels:
    app: compilation-worker
spec:
  # Recreate strategy avoids CPU surge on 1-replica deployments (kills old pod before new one starts)
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: compilation-worker
  template:
    metadata:
      labels:
        app: compilation-worker
    spec:
      serviceAccountName: iicpc-compiler
      containers:
      - name: compiler
        image: 445711599575.dkr.ecr.us-east-1.amazonaws.com/iicpc-compiler:latest
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: iicpc-config
        resources:
          limits:
            cpu: "1"
            memory: 1Gi
          requests:
            cpu: "200m"
            memory: 256Mi
