apiVersion: apps/v1
kind: Deployment
metadata:
  name: pretest-worker
  namespace: default
  labels:
    app: pretest-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pretest-worker
  template:
    metadata:
      labels:
        app: pretest-worker
    spec:
      containers:
      - name: pretest
        image: iicpc-pretest:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: REDIS_ADDR
          value: "redis:6379"
        - name: DB_ADDR
          value: "postgres://iicpc:iicpc_secret@postgres:5432/iicpc_db?sslmode=disable"
        - name: SANDBOX_NET
          value: "kind"
        volumeMounts:
        - name: docker-socket
          mountPath: /var/run/docker.sock
        resources:
          limits:
            cpu: "4"
            memory: 1Gi
          requests:
            cpu: "4"
            memory: 512Mi
      volumes:
      - name: docker-socket
        hostPath:
          path: /var/run/docker.sock
          type: Socket
