apiVersion: apps/v1
kind: Deployment
metadata:
  name: testing-worker
  namespace: default
  labels:
    app: testing-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: testing-worker
  template:
    metadata:
      labels:
        app: testing-worker
    spec:
      containers:
      - name: testing
        image: iicpc-testing:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: REDIS_ADDR
          value: "redis:6379"
        - name: DB_ADDR
          value: "postgres://iicpc:iicpc_secret@postgres:5432/iicpc_db?sslmode=disable"
        - name: S3_ENDPOINT
          value: "host.docker.internal:9000"
        - name: SANDBOX_NET
          value: "kind"
        - name: SWEEPER_TIMEOUT_MINUTES
          value: "30"
        volumeMounts:
        - name: docker-socket
          mountPath: /var/run/docker.sock
        resources:
          limits:
            cpu: "2"
            memory: 1Gi
          requests:
            cpu: "500m"
            memory: 512Mi
      volumes:
      - name: docker-socket
        hostPath:
          path: /var/run/docker.sock
          type: Socket
