apiVersion: apps/v1
kind: Deployment
metadata:
  name: testing-worker
  namespace: default
  labels:
    app: testing-worker
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: testing-worker
  template:
    metadata:
      labels:
        app: testing-worker
    spec:
      serviceAccountName: iicpc-testing
      containers:
      - name: testing
        image: ACCOUNT_ID.dkr.ecr.AWS_REGION.amazonaws.com/iicpc-testing:latest
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: iicpc-config
        env:
        - name: SWEEPER_TIMEOUT_MINUTES
          value: "30"
        resources:
          limits:
            cpu: "1"
            memory: 1Gi
          requests:
            cpu: "200m"
            memory: 256Mi
