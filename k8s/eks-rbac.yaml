apiVersion: v1
kind: Namespace
metadata:
  name: iicpc-sandboxes
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kaniko-docker-config
  namespace: default
data:
  config.json: |
    {
      "credsStore": "ecr-login"
    }
---
# ServiceAccounts for IRSA Mappings (Role ARNs replaced by deployment script)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: iicpc-gateway
  namespace: default
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/iicpc-benchgrid-gateway-pod-role"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: iicpc-compiler
  namespace: default
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/iicpc-benchgrid-compiler-pod-role"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kaniko-sa
  namespace: default
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/iicpc-benchgrid-compiler-pod-role"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: iicpc-testing
  namespace: default
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/iicpc-benchgrid-testing-pod-role"
---
# RBAC for Compiler Worker to schedule Kaniko Jobs in default namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: compiler-job-manager
  namespace: default
rules:
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["create", "get", "list", "watch", "delete"]
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: compiler-job-manager-binding
  namespace: default
subjects:
- kind: ServiceAccount
  name: iicpc-compiler
  namespace: default
roleRef:
  kind: Role
  name: compiler-job-manager
  apiGroup: rbac.authorization.k8s.io
---
# RBAC for Testing Worker to schedule contestant Pods in iicpc-sandboxes namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sandbox-manager
  namespace: iicpc-sandboxes
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["create", "get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: testing-sandbox-manager-binding
  namespace: iicpc-sandboxes
subjects:
- kind: ServiceAccount
  name: iicpc-testing
  namespace: default
roleRef:
  kind: Role
  name: sandbox-manager
  apiGroup: rbac.authorization.k8s.io
