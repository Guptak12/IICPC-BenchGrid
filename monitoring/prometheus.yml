global:
  scrape_interval: 2s
  evaluation_interval: 2s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'iicpc-gateway'
    static_configs:
      - targets: ['gateway:9093', 'host.docker.internal:9093']

  - job_name: 'iicpc-compiler'
    static_configs:
      - targets: ['compiler:9091', 'host.docker.internal:9091']

  - job_name: 'iicpc-pretest'
    static_configs:
      - targets: ['pretest:9092', 'host.docker.internal:9092']
