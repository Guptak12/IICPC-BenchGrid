<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BenchGrid - IICPC Summer Hackathon 2026 Live Leaderboard</title>
    <meta name="description" content="Real-time leaderboard and analytics for IICPC Summer Hackathon 2026 matching engine benchmarks. Submit, compile, stress-test, and score C++ trading engines.">
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="app-container">

    <!-- ================================================================
         HEADER
         ================================================================ -->
    <header class="site-header">
        <div class="site-header__brand" style="font-family:var(--font-mono); font-weight:700;">
            <a href="#/" style="text-decoration:none; color:var(--text-primary); font-size:1.15rem; letter-spacing:-0.5px; display:inline-flex; align-items:center; gap:2px;">
                <span style="color:var(--accent); font-weight:bold;">[+</span>
                <span>BENCHGRID</span>
                <span style="color:var(--accent); font-weight:bold;">]</span>
            </a>
        </div>
        
        <!-- Central Navigation links -->
        <nav class="site-header__nav" style="display:flex; gap:20px; align-items:center; margin-left:40px; margin-right:auto;">
            <a href="#/arena" class="nav-link">Arenas</a>
            <a href="#/protocol" class="nav-link">Protocol Spec</a>
        </nav>

        <nav class="site-header__status">
            <div class="status-item">
                <div class="status-led status-led--ok" id="postgres-led"></div>
                <span>Database</span>
            </div>
            <div class="status-item">
                <div class="status-led status-led--ok" id="redis-led"></div>
                <span>Streams</span>
            </div>
            <div class="status-item" id="node-status">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px;color:var(--text-secondary);">
                    <rect x="2" y="2" width="20" height="8" rx="2"/>
                    <rect x="2" y="14" width="20" height="8" rx="2"/>
                    <circle cx="6" cy="6" r="1" fill="currentColor"/><circle cx="6" cy="18" r="1" fill="currentColor"/>
                </svg>
                <span>Nodes: Active</span>
            </div>
            <a href="/dashboard" target="_blank" class="header-link">Dev Dashboard</a>
            
            <!-- Dynamic authentication user section -->
            <div id="nav-right" style="display:flex; gap:15px; align-items:center; border-left:1px solid var(--border-subtle); padding-left:15px; margin-left:10px;"></div>
        </nav>
    </header>

    <!-- Dynamic SPA view container -->
    <div id="app"></div>

</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
